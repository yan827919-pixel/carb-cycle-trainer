      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#003344"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#00f0ff" stroke-width="10" opacity="0.9"/>
  <!-- Inner ring -->
